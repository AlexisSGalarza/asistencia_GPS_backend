[build]
builder = "nixpacks"

[deploy]
# $RAILWAY_SERVICE_NAME detecta qué servicio está corriendo:
#   auto_salidas   → cron 0 6 * * *     (06:00 UTC = 00:00 CST)
#   generar_faltas → cron */30 * * * *  (cada 30 min)
#   cualquier otro → servidor principal (migrate + gunicorn)
startCommand = "[ \"$RAILWAY_SERVICE_NAME\" = 'auto_salidas' ] && exec python manage.py auto_salidas; [ \"$RAILWAY_SERVICE_NAME\" = 'generar_faltas' ] && exec python manage.py generar_faltas; python manage.py migrate --no-input && python manage.py crear_admin && exec gunicorn config.wsgi:application --bind 0.0.0.0:$PORT"

