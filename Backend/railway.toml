[build]
builder = "nixpacks"

[deploy]
startCommand = "python manage.py migrate --no-input && python manage.py crear_admin; gunicorn config.wsgi:application --bind 0.0.0.0:$PORT"

# Para el servicio CRON de auto-salidas, crea un servicio separado en Railway
# (GitHub Repository → mismo repo) y en Settings > Deploy > Custom Start Command pon:
#   python manage.py auto_salidas
# Cron Schedule: 0 6 * * *  (06:00 UTC = 00:00 CST México)
# Root Directory: Backend
